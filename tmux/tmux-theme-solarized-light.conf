# Solarized Light theme

set -g status-style fg=#657b83,bg=#eee8d5
set -g window-status-current-style fg=#fdf6e3,bold,bg=#268bd2
set -g window-status-last-style fg=#073642,bold,bg=default
set -g pane-active-border-style bg=default,fg=#657b83
set -g pane-border-style bg=default,fg=#93a1a1

# #h hostshort , #S session , #W window , #T pane name
wg_prfx=" #[fg=default,bg=default]#{?client_prefix,<Prefix>,}"  # prefix indicator widget
wg_pane=" #[fg=default,bg=default]#{=26:pane_title}"
wg_date=" #[fg=default,bg=default]%d-%b-%Y#[none]"
wg_time=" #[fg=default,bg=default]%H:%M#[none]  "

set -g status-right "${wg_prfx}${wg_pane}${wg_date}${wg_time}"
